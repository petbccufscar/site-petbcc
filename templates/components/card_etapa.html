{% load static %}
<div class="flex flex-col justify-start w-full gap-4 border border-gray-200 rounded-xl p-6">
    <div class="flex flex-col gap-3">
        <div><span class="text-white px-3 py-1 bg-cyan-500 rounded-lg">Etapa {{ etapa }}</span></div>
        <h3 class="text-xl font-normal">{{ nome_etapa }}</h3>
    </div>
    <div class="flex flex-col gap-3">
        <div>
            <p>{{ descricao }}</p>
        </div>
        <div>
            <div class="flex gap-1 text-center"><ion-icon name="calendar" class="text-base text-black h-auto"></ion-icon><span class="flex">{{ data_inicio }} - {{ data_fim }}</span></div>
            {% if data_resultado %}
            <div class="flex gap-1 text-center">{% include "./icons/check.html" with class="w-4 h-4 text-green-500 self-center" %}<span>Resultado {{ data_resultado }}</span></div>
            {% endif %}
        </div>
    </div>
</div>
