<div class="p-6 rounded-xl border border-gray-200">
  <p class="text-gray-700 font-bold mb-2">{{ titulo }}</p>
  <p class="text-gray-500 mb-6">{{ descricao }}</p>

  <div class="flex gap-4 text-gray-400 text-sm flex-wrap">
    {% if projeto %}
      <a href="{% url 'core:projeto' projeto.id %}" class="block"><p class="bg-gray-100 text-gray-700 border rounded-xl px-4 py-2">{{ projeto.nome }}</p></a>
    {% endif %}

    <div class="flex gap-2 items-center">
      <ion-icon name="calendar-clear-outline" class="text-lg"></ion-icon>
      <p>{{ data|date:'d/m/Y' }}</p>
    </div>

    <div class="flex gap-2 items-center">
      <ion-icon name="time-outline" class="text-lg"></ion-icon>
      <p class="flex gap-1">{{ tempo }}</p>
    </div>

    <div class="flex -space-x-2">
      {% for membro in membros %}
        <a class="block cursor-pointer" href="{% url 'core:membro' id=membro.id %}">
          <div title="{{ membro.nome }}">
            {% if membro.foto %}
              <img src="{{ membro.foto.url }}" alt="Foto de um membro participante do registro" class="w-8 h-8 rounded-full object-fill scale-120 shadow-md" />
            {% else %}
              <ion-icon name="person-outline" class="text-4xl text-gray-400 shadow-md"></ion-icon>
            {% endif %}
          </div>
        </a>
      {% endfor %}
    </div>
  </div>
</div>
