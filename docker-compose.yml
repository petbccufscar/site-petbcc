services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
  tailwind:
    build: .
    command: python manage.py tailwind start
    volumes:
      - .:/app
    depends_on:
      - web
    tty: true
    stdin_open: true